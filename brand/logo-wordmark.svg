<!--
  Trabecc wordmark — symbol + lowercase wordmark.
  Lowercase reads more confidently as a developer-tool brand
  (cf. stripe, vercel, plaid). Uses system sans (ui-sans-serif)
  so it matches the surrounding UI without bundling a custom font.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Trabecc">
  <!-- Symbol -->
  <rect width="64" height="64" rx="14" fill="#11151a"/>
  <rect x="12" y="14" width="40" height="7" rx="2" fill="#93c5fd"/>
  <rect x="28.5" y="14" width="7" height="36" rx="1.5" fill="#93c5fd"/>
  <rect x="20" y="46" width="24" height="5" rx="1.5" fill="#93c5fd" opacity="0.65"/>

  <!-- Wordmark -->
  <text x="80" y="44"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.02em" fill="#0b0d10">trabecc</text>
</svg>
