<!--
  Trabecc social preview card. 1200x630.
  Crimson brand + actual logo embedded.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#dc143c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brandgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc143c"/>
      <stop offset="100%" stop-color="#ec4664"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0c"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="316" x2="1200" y2="316"/>
    <line x1="0" y1="474" x2="1200" y2="474"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Logo on the right, glowing -->
  <g transform="translate(820, 100)">
    <circle cx="160" cy="220" r="190" fill="#dc143c" opacity="0.18" filter="blur(20px)"/>
    <image href="trabecc_logo.png" x="0" y="60" width="320" height="320"/>
  </g>

  <!-- Pill -->
  <g transform="translate(80, 100)">
    <rect width="280" height="44" rx="22" fill="#dc143c" fill-opacity="0.10" stroke="#dc143c" stroke-opacity="0.35"/>
    <circle cx="22" cy="22" r="4" fill="#dc143c"/>
    <text x="38" y="29"
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
          font-size="15" font-weight="600" letter-spacing="0.04em" fill="#ec4664">v0.1.1 · open-source · MIT</text>
  </g>

  <!-- Wordmark -->
  <text x="80" y="220"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-0.03em" fill="#ffffff">Trabecc</text>

  <!-- Headline (two lines) -->
  <text x="80" y="320"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-0.025em" fill="#fafafa">Trust, but <tspan fill="url(#brandgrad)">audit</tspan> —</text>
  <text x="80" y="385"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-0.025em" fill="#fafafa">every AI tool call.</text>

  <!-- Sub-line -->
  <text x="80" y="455"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="24" font-weight="500" fill="#a1a1aa">Default-deny policy · audit log · rate limits — for MCP.</text>

  <!-- URL footer -->
  <text x="80" y="555"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="22" font-weight="500" fill="#22c55e">→ trabecc.com</text>
</svg>
