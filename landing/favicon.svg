<!--
  Trabecc symbol — stylized I-beam profile.
  Latin "trabes" = beam. The I-beam (or T-beam in profile) is the canonical
  load-bearing structural element. Reads at 16x16 favicon size all the way
  up to 256x256 avatar.
  Brand color: #93c5fd over #11151a surface.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Trabecc">
  <rect width="64" height="64" rx="14" fill="#11151a"/>
  <!-- top flange -->
  <rect x="12" y="14" width="40" height="7" rx="2" fill="#93c5fd"/>
  <!-- web (vertical stem) -->
  <rect x="28.5" y="14" width="7" height="36" rx="1.5" fill="#93c5fd"/>
  <!-- bottom flange (slightly thinner + narrower for visual balance) -->
  <rect x="20" y="46" width="24" height="5" rx="1.5" fill="#93c5fd" opacity="0.65"/>
</svg>
