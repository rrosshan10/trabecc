name: Bug report
description: Something is broken in Trabecc.
labels: [bug, triage]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of what you saw vs. what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        Steps to reproduce. Include your `trabecc.yaml` (with secrets removed)
        and the MCP client you're using (Claude Desktop, Cursor, etc).
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output from `TRABECC_LOG=debug trabecc run` or `trabecc doctor`.
      render: shell
  - type: input
    id: version
    attributes:
      label: Trabecc version
      placeholder: e.g. 0.1.2
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. v24.13.1
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
