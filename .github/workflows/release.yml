name: release

# Runs on every `v*` tag push. Publishes to npm via OIDC Trusted Publishing
# (https://docs.npmjs.com/trusted-publishers). No NPM_TOKEN secret needed —
# npm exchanges the GitHub OIDC token for a short-lived publish credential.
#
# Prerequisites (one-time, in the npm web UI):
#   npmjs.com → trabecc package → Settings → Publishing access
#   → Trusted Publisher: GitHub Actions
#     Organization or user: rrosshan10
#     Repository:           trabecc
#     Workflow filename:    release.yml
#     Environment:          (leave blank unless you add one)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # softprops/action-gh-release needs this to create the GitHub release
  id-token: write   # required: lets npm CLI request an OIDC token from GitHub for trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # OIDC trusted publishing requires npm >= 11.5.1. Node 24 bundles 11.8+,
      # so assert instead of upgrading: an in-place `npm install -g npm@latest`
      # corrupted the runner's npm tree once (MODULE_NOT_FOUND: 'sigstore').
      - name: Assert npm >= 11.5.1 (required for OIDC trusted publishing)
        run: |
          v=$(npm --version); echo "npm $v"
          [ "$(printf '%s\n' 11.5.1 "$v" | sort -V | head -1)" = "11.5.1" ] \
            || { echo "npm $v is too old for OIDC trusted publishing"; exit 1; }

      - run: npm ci --no-audit --no-fund

      - run: npx tsc --noEmit

      # No NODE_AUTH_TOKEN env: when no token is present and id-token: write
      # is granted, npm CLI automatically uses the OIDC token from GitHub
      # to authenticate AND to attach a provenance attestation. The same
      # flow signs and uploads the Sigstore record.
      - name: Publish to npm (OIDC trusted publishing + provenance)
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
