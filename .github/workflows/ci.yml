name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: |
          node --test \
            tests/policy.test.ts \
            tests/namespace.test.ts \
            tests/ratelimit.test.ts \
            tests/redact.test.ts \
            tests/cloud_sync.test.ts \
            tests/audit_store.test.ts

      - name: E2E smoke
        run: node tests/e2e.smoke.ts
        env:
          TRABECC_LOG: warn
        # The e2e smoke spawns the upstream filesystem MCP server via npx and
        # talks to the gateway over real stdio MCP. Skipped only if a future
        # upstream change breaks compatibility unrelated to Trabecc.
        continue-on-error: false

      - name: Verify CLI starts and exits cleanly
        # The smoke test above already exercises the gateway end-to-end with
        # an isolated config. This step independently exercises `doctor`
        # against the example config to catch regressions in the CLI front
        # door. Timeout is generous because cold npx downloads of upstream
        # MCP servers on CI can take 10-15s.
        run: |
          cp trabecc.example.yaml trabecc.yaml
          timeout 60 node src/cli.ts doctor
          rm trabecc.yaml
